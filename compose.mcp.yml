services:
  sonarqube-mcp:
    image: mcp/sonarqube:latest
    environment:
      SONARQUBE_TOKEN: ${SONARQUBE_TOKEN:?set SONARQUBE_TOKEN before running compose}
      SONARQUBE_ORG: ${SONARQUBE_ORG:-stefanbilliet}
      SONARQUBE_URL: ${SONARQUBE_URL:-https://sonarcloud.io}
      SONARQUBE_READ_ONLY: "true"
      SONARQUBE_TRANSPORT: http
      SONARQUBE_HTTP_HOST: 0.0.0.0
      SONARQUBE_HTTP_PORT: 8080
    ports:
      - "8081:8080"
    restart: unless-stopped

  sonarqube-mcp-gateway:
    image: caddy:2-alpine
    environment:
      SONARQUBE_TOKEN: ${SONARQUBE_TOKEN:?set SONARQUBE_TOKEN before running compose}
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    depends_on:
      - sonarqube-mcp
    ports:
      - "8083:8080"
    volumes:
      - ./docker/mcp-sonarqube-gateway/Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

  dotnet-csharp-mcp:
    build:
      context: .
      dockerfile: docker/mcp-csharp/Dockerfile
    command:
      - supergateway
      - --stdio
      - csharp-lsp-mcp
      - --outputTransport
      - streamableHttp
      - --port
      - "8080"
      - --streamableHttpPath
      - /mcp
      - --logLevel
      - info
    volumes:
      - /Users/stefanbilliet/Workspace:/workspace:rw
    working_dir: /workspace
    ports:
      - "8082:8080"
    restart: unless-stopped
